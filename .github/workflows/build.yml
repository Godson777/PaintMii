name: Build Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: PaintMii-windows
            exe_name: PaintMii.exe
          - os: macos-latest
            artifact_name: PaintMii-macos
            exe_name: PaintMii
          - os: ubuntu-latest
            artifact_name: PaintMii-linux
            exe_name: PaintMii

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyserial pillow rich pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller PaintMii.spec

      - name: Zip output (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/PaintMii -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Zip output (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          cd dist && zip -r ../${{ matrix.artifact_name }}.zip PaintMii

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}.zip
